name: Update IPI Data

on:
  push:
    paths:
      - 'my-ipi-dashboard/data/raw/ipi_man.xlsx'
  workflow_dispatch:

# Permisos necesarios para que el bot pueda hacer el 'git push'
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: my-ipi-dashboard/scripts
        run: |
          pip install pandas>=2.1.0 openpyxl>=3.1.2

      - name: Process data
        working-directory: my-ipi-dashboard/scripts
        run: python processor.py

      - name: Copy JSONs to public folder
        working-directory: my-ipi-dashboard
        run: |
          mkdir -p public/data
          cp -f data/processed/ipi_cuadro1.json public/data/
          cp -f data/processed/ipi_cuadro2.json public/data/

      - name: Commit and push if data changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Agregamos los cambios en ambas carpetas
          git add my-ipi-dashboard/data/processed/*.json
          git add my-ipi-dashboard/public/data/*.json
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: actualizar datos IPI [$(date +'%Y-%m')]"
            git push origin main
          else
            echo "No hay cambios detectados en los datos."
          fi
